name: Docker Build and Publish to ECR

on:
  push:
    branches: [ "main", "master" ]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: notas-venta
  ECR_REGISTRY: 298572504484.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
        docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      env:
        AWS_KEY: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_SSH_KEY }}
        envs: AWS_KEY,AWS_SECRET,AWS_TOKEN
        script: |
          export AWS_ACCESS_KEY_ID="$AWS_KEY"
          export AWS_SECRET_ACCESS_KEY="$AWS_SECRET"
          export AWS_SESSION_TOKEN="$AWS_TOKEN"
          aws ecr get-login-password --region us-east-1 | \
            docker login --username AWS --password-stdin 298572504484.dkr.ecr.us-east-1.amazonaws.com
          docker pull 298572504484.dkr.ecr.us-east-1.amazonaws.com/notas-venta:latest
          docker network create examen-net 2>/dev/null || true
          docker stop notas-venta 2>/dev/null || true
          docker rm notas-venta 2>/dev/null || true
          docker run -d \
            --name notas-venta \
            --network examen-net \
            -p 8000:8000 \
            -e DATABASE_URL=postgresql://exam_user:exam_password@db:5432/exam_db \
            -e AWS_REGION=us-east-1 \
            -e AWS_ACCESS_KEY_ID="$AWS_KEY" \
            -e AWS_SECRET_ACCESS_KEY="$AWS_SECRET" \
            -e AWS_SESSION_TOKEN="$AWS_TOKEN" \
            -e AWS_BUCKET_NAME=ar709569-esi3898k-examen1 \
            -e SNS_TOPIC_ARN=arn:aws:sns:us-east-1:298572504484:notas-venta-notifications \
            -e ENVIRONMENT=produccion \
            -e CATALOGO_SERVICE_URL=http://catalogo:8000 \
            -e NOTIFICACIONES_SERVICE_URL=http://notificaciones:8000 \
            -e PUBLIC_BASE_URL=http://98.82.201.72:8000 \
            --restart unless-stopped \
            298572504484.dkr.ecr.us-east-1.amazonaws.com/notas-venta:latest
